<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <span class="nav-brand">⛅ Weather Dashboard</span>
    <a href="admin.html">Admin Panel</a>
  </nav>

  <main>

    <!-- Search & Filter Section -->
    <section class="search-section">
      <h1>Weather & Activity Planner</h1>
      <p class="subtitle">Search a city or filter by weather condition</p>

      <div class="controls">
        <input type="text" id="searchInput" placeholder="Search by city..." />
        <select id="filterCondition">
          <option value="">All Conditions</option>
          <option value="Sunny">Sunny</option>
          <option value="Rainy">Rainy</option>
          <option value="Cloudy">Cloudy</option>
          <option value="Stormy">Stormy</option>
          <option value="Hazy">Hazy</option>
        </select>
      </div>
    </section>

    <!-- Loading & Error States -->
    <p id="loadingMsg" class="loading">Loading weather data...</p>
    <p id="errorMsg" class="error hidden">Could not load data. Is JSON Server running?</p>

   <!-- Main Content Area -->
    <div class="content-layout">

      <!-- Weather Cards -->
      <div class="cards-container">
        <section id="weatherList" class="weather-grid">
          <!-- Cards injected by app.js -->
        </section>
      </div>

      <!-- Add New Weather Form -->
      <aside class="form-container">
        <section class="form-section">
      <h2>Add New City Weather</h2>
      <form id="addWeatherForm">

        <div class="form-group">
          <label for="city">City Name</label>
          <input type="text" id="city" placeholder="e.g. Lahore" />
          <span class="error-msg" id="cityError"></span>
        </div>

        <div class="form-group">
          <label for="temperature">Temperature (°C)</label>
          <input type="number" id="temperature" placeholder="e.g. 35" />
          <span class="error-msg" id="temperatureError"></span>
        </div>

        <div class="form-group">
          <label for="condition">Condition</label>
          <select id="condition">
            <option value="">Select condition</option>
            <option value="Sunny">Sunny</option>
            <option value="Rainy">Rainy</option>
            <option value="Cloudy">Cloudy</option>
            <option value="Stormy">Stormy</option>
            <option value="Hazy">Hazy</option>
          </select>
          <span class="error-msg" id="conditionError"></span>
        </div>

        <div class="form-group">
          <label for="humidity">Humidity (%)</label>
          <input type="number" id="humidity" placeholder="e.g. 60" />
          <span class="error-msg" id="humidityError"></span>
        </div>

        <div class="form-group">
          <label for="wind">Wind Speed (km/h)</label>
          <input type="number" id="wind" placeholder="e.g. 12" />
          <span class="error-msg" id="windError"></span>
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
          <span class="error-msg" id="dateError"></span>
        </div>

        <button type="submit">Add City</button>

      </form>
    </section>
      </aside>

    </div>

  </main>

  <footer>
    <p>Weather Dashboard & Activity Planner &copy; 2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
